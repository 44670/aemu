<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>aemu MCPE WebGL</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #101417;
        color: #eef2f4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      header,
      footer {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        border-color: #2a3338;
        background: #171d21;
      }

      header {
        border-bottom: 1px solid #2a3338;
        flex-wrap: wrap;
      }

      footer {
        border-top: 1px solid #2a3338;
      }

      main {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        min-height: 0;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
        background: #050607;
      }

      aside {
        min-width: 0;
        border-left: 1px solid #2a3338;
        background: #12181b;
        overflow: auto;
      }

      pre {
        margin: 0;
        padding: 12px;
        min-height: 100%;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: #cbd5da;
      }

      input,
      select,
      button {
        height: 32px;
        border: 1px solid #39464d;
        border-radius: 6px;
        background: #20282d;
        color: #eef2f4;
        font: inherit;
      }

      input[type="number"] {
        width: 132px;
      }

      button {
        padding: 0 14px;
        background: #d8b54d;
        border-color: #edcd69;
        color: #161408;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      @media (max-width: 820px) {
        main {
          grid-template-columns: 1fr;
          grid-template-rows: 60vh 40vh;
        }

        aside {
          border-left: 0;
          border-top: 1px solid #2a3338;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <label>APK <input id="apk" type="file" accept=".apk,application/zip" /></label>
      <label>
        ABI
        <select id="abi">
          <option value="armeabi-v7a" selected>armeabi-v7a</option>
          <option value="armeabi">armeabi</option>
        </select>
      </label>
      <label>Steps <input id="steps" type="number" min="1" value="300000000" /></label>
      <button id="run">Run</button>
    </header>
    <main>
      <canvas id="aemu-canvas" width="854" height="480"></canvas>
      <aside><pre id="status">idle</pre></aside>
    </main>
    <footer>aemu WebGL first-frame harness</footer>
    <script type="module">
      import init, { runMcpeFirstFrame } from "./pkg/aemu.js";

      const apk = document.getElementById("apk");
      const abi = document.getElementById("abi");
      const steps = document.getElementById("steps");
      const run = document.getElementById("run");
      const status = document.getElementById("status");
      const wasmReady = init();

      run.addEventListener("click", async () => {
        if (!apk.files.length) {
          status.textContent = "select an APK";
          return;
        }
        run.disabled = true;
        status.textContent = "running";
        await new Promise(requestAnimationFrame);
        try {
          await wasmReady;
          const bytes = new Uint8Array(await apk.files[0].arrayBuffer());
          const result = runMcpeFirstFrame(
            bytes,
            abi.value,
            "aemu-canvas",
            Number(steps.value) || 0,
          );
          status.textContent = JSON.stringify(result, null, 2);
        } catch (error) {
          status.textContent = String(error && error.message ? error.message : error);
        } finally {
          run.disabled = false;
        }
      });
    </script>
  </body>
</html>
